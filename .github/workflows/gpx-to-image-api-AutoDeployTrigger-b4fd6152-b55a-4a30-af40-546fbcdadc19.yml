name: Trigger auto deployment for gpx-to-image-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/gpx-to-image-api-AutoDeployTrigger-b4fd6152-b55a-4a30-af40-546fbcdadc19.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.GPXTOIMAGEAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.GPXTOIMAGEAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.GPXTOIMAGEAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: mxstk8scontainers.azurecr.io
          registryUsername: ${{ secrets.GPXTOIMAGEAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.GPXTOIMAGEAPI_REGISTRY_PASSWORD }}
          containerAppName: gpx-to-image-api
          resourceGroup: gxp-to-image
          imageToBuild: mxstk8scontainers.azurecr.io/gpx-to-image-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


